name: Build iOS App

on:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets (Vite)
        run: npm run build

      - name: Setup Capacitor iOS
        run: |
          npm install @capacitor/ios@latest @capacitor/cli@latest
          npx cap add ios
          npx cap sync ios

      - name: Build iOS App via Xcode CLI
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Compress App for Download
        run: |
          cd ios/App
          cd build/Debug-iphonesimulator || cd DerivedData/App/Build/Products/Debug-iphonesimulator || cd ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphonesimulator
          zip -r ../../../../bac-search-ios.zip App.app

      - name: Upload Finished App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bac-search-ios-app
          path: bac-search-ios.zip
